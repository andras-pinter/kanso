<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>kanso</title>
    <script>
      // Pre-paint theme: read persisted pref before React mounts so we
      // never flash the wrong theme. Kept inline + tiny on purpose.
      (function () {
        try {
          var pref = localStorage.getItem('kanso.theme');
          if (pref === 'light' || pref === 'dark') {
            document.documentElement.setAttribute('data-theme', pref);
          }
        } catch (_) {
          /* storage unavailable — fall back to media query */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
