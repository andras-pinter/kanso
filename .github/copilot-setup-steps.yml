# Preinstall toolchain for the Copilot cloud agent.
# Mirrors `just bootstrap` expectations.

name: Copilot setup steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable) + rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Verify Rust toolchain
        run: |
          rustc --version
          cargo --version
          cargo fmt --version
          cargo clippy --version

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Verify Node
        run: |
          node --version
          npm --version

      - name: Install just
        uses: extractions/setup-just@v2
        with:
          just-version: "1.36.0"

      - name: Verify just
        run: just --version

      - name: Install lefthook
        run: |
          curl -sSfL https://raw.githubusercontent.com/evilmartians/lefthook/master/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify lefthook
        run: lefthook version
